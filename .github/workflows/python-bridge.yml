name: Python Bridge

on:
  push:
    branches:
      - master
    paths:
      - "python/**"
      - ".github/workflows/python-bridge.yml"

  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: python -m pip install build

      - run: python -m build python/ --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wxn0brp-db-conduit-dist
          path: python/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

      - name: Publish Nightly Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          make_latest: false
          files: python/dist/*.whl
