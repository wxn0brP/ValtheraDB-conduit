name: Build

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - "tsconfig.json"
      - "suglite.json5"
      - ".github/workflows/build.yml"
    tags:
      - "*"

  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
      - run: bun test
      - run: bunx tsc --noEmit

  compile:
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset: valtheradb-conduit-linux-x64
          - target: bun-linux-arm64
            asset: valtheradb-conduit-linux-arm64
          - target: bun-darwin-x64
            asset: valtheradb-conduit-darwin-x64
          - target: bun-darwin-arm64
            asset: valtheradb-conduit-darwin-arm64
          - target: bun-windows-x64
            asset: valtheradb-conduit-windows-x64.exe
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
      - run: mkdir -p dist
      - run: >
          bun build --compile
          --target=${{ matrix.target }}
          --outfile=dist/${{ matrix.asset }}
          --external=json5
          --external=yaml
          src/index.ts

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    needs: compile
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          make_latest: false
          files: dist/*
